services:
  api:
    build: .
    container_name: api
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "my-bookshelf"
    volumes:
      - ./var/logs:/app/var/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: frontend/
    container_name: frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_TARGET: "http://api:8000"
    ports:
      - "5173:5173"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./grafana/config.alloy:/etc/alloy/config.alloy:ro
      - ./var/logs:/var/log:ro
    depends_on:
      - mimir
      - loki
    ports:
      - "12345:12345"

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command:
      - -config.file=/etc/tempo/config.yaml
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo/config.yaml:ro
    ports:
      - "3200:3200"
    depends_on:
      - alloy
      - mimir
      - loki

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command:
      - -config.file=/etc/mimir/config.yaml
      - -target=all
    volumes:
      - ./grafana/mimir.yaml:/etc/mimir/config.yaml:ro
    ports:
      - "9009:9009"

  loki:
    image: grafana/loki:latest
    container_name: loki
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./grafana/loki.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    user: '0'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - mimir
      - loki
      - tempo
    ports:
      - "3000:3000"
