services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      DB_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "my-bookshelf"
    volumes:
      - app-logs:/app/var/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: frontend/
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_TARGET: "http://api:8000"
    ports:
      - "5173:5173"

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./grafana/config.alloy:/etc/alloy/config.alloy:ro
      - app-logs:/var/log:ro
    depends_on:
      - mimir
      - loki
    ports:
      - "12345:12345"

  mimir:
    image: grafana/mimir:latest
    command:
      - -config.file=/etc/mimir/config.yaml
      - -target=all
    volumes:
      - ./grafana/mimir.yaml:/etc/mimir/config.yaml:ro
    ports:
      - "9009:9009"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - mimir
      - loki
    ports:
      - "3000:3000"

volumes:
  pgdata:
  app-logs:
